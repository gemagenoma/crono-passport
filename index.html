<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crono Passport Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <section class="form-section" id="formSection">
            <form id="passportForm">
                <input type="text" id="name" placeholder="Nombre" required>
                <input type="text" id="alias" placeholder="Apodo" required>
                <input type="text" id="job" placeholder="Tarea" required>
                <div class="timer-container">
                    <p>Faltan <strong id="timerDisplay">0</strong> hasta el 1 de enero de 2027</p>
                </div>
                <button type="submit" class="submit-btn">Generar Pasaporte</button>
            </form>
        </section>

        <section class="passport-section" id="passportSection" style="display: none;">
            <div class="passport-card">
                <div class="passport-name" id="displayName">---</div>
                <div class="passport-alias" id="displayAlias">---</div>
                <div class="passport-job" id="displayJob">---</div>
                <div class="passport-id" id="displayId">---</div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
